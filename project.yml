name: GlowUp

options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Add your Apple Team ID here

targets:
  GlowUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GlowUp
        excludes:
          - "Info.plist"
    info:
      path: GlowUp/Info.plist
      properties:
        NSCameraUsageDescription: "GlowUp uses your camera to take photos for AI-powered appearance analysis."
        NSPhotoLibraryUsageDescription: "GlowUp accesses your photo library so you can select a photo for analysis."
        CFBundleDisplayName: "GlowUp"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.glowup
        INFOPLIST_FILE: GlowUp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: GlowUp/GlowUp.entitlements
    capabilities:
      in-app-purchase: {}
